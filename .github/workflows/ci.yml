name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # scripts/ci.sh: restore + build + dotnet test; Origo.Core.Tests runs Coverlet (line >= 90% gate).
      - name: CI — build, tests, Origo.Core line coverage (>=90% via Coverlet)
        run: bash scripts/ci.sh
