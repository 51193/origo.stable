name: CI

on:
  push:
    branches: [ main, master, origin ]
  pull_request:
    branches: [ main, master, origin ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore Origo.sln

      - name: Build
        run: dotnet build Origo.sln --no-restore --configuration Release

      - name: Test
        run: dotnet test Origo.sln --no-build --configuration Release --verbosity normal
